syntax = "proto3";

package appointment;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/BlackHole55/assignment-2-proto/appointment/;appointmentpb";

enum Status {
    STATUS_UNSPECIFIED = 0;
    NEW = 1;
    IN_PROGRESS = 2;
    DONE = 3;
}

// AppointmentService is responsible for managing the lifecycle of medical appointments within the platform.
service AppointmentService {
    // CreateAppointment registers a new appointment in the system.
    rpc CreateAppointment(CreateAppointmentRequest) returns (AppointmentResponse);
    
    // GetAppointment retrieves the details of a single appointment by its unique ID.
    rpc GetAppointment(GetAppointmentRequest) returns (AppointmentResponse);
    
    // ListAppointments returns a collection of all appointments.
    rpc ListAppointments(ListAppointmentsRequest) returns (ListAppointmentsResponse);
    
    // UpdateAppointmentStatus modifies the lifecycle state of an existing appointment.
    rpc UpdateAppointmentStatus(UpdateStatusRequest) returns (AppointmentResponse);

}

message CreateAppointmentRequest {
    string title = 1;
    string description = 2;
    string doctor_id = 3;
}

message GetAppointmentRequest { 
    string id = 1; 
}

message ListAppointmentsRequest {}

message UpdateStatusRequest { 
    string id = 1; 
    Status status = 2; 
}

message AppointmentResponse {
    string id = 1;
    string title = 2;
    string description = 3;
    string doctor_id = 4;
    Status status = 5;
    google.protobuf.Timestamp created_at = 6;
    google.protobuf.Timestamp updated_at = 7;
}
message ListAppointmentsResponse { repeated AppointmentResponse appointments = 1; }