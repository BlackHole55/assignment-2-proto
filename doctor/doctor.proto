syntax = "proto3";

package doctor;

option go_package = "github.com/BlackHole55/advanced-programming-2/assignment-2/doctor-service/proto;doctorpb";

// DoctorService is responsible for managing the lifecycle of doctors within the platform.
service DoctorService {
    // CreateDoctor registers a new doctor in the system.
    rpc CreateDoctor(CreateDoctorRequest) returns (DoctorResponse);

    // GetDoctor retrieves the details of a single doctor by its unique ID.
    rpc GetDoctor(GetDoctorRequest) returns (DoctorResponse);
    
    // ListDoctors returns a collection of all doctors.
    rpc ListDoctors(ListDoctorsRequest) returns (ListDoctorsResponse);
}
message CreateDoctorRequest {
    string full_name = 1;
    string specialization = 2;
    string email = 3;
}
message GetDoctorRequest { string id = 1; }

message ListDoctorsRequest {}

message DoctorResponse {
    string id = 1;
    string full_name = 2;
    string specialization = 3;
    string email = 4;
}

message ListDoctorsResponse { repeated DoctorResponse doctors = 1; }